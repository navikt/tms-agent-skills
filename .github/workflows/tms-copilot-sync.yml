name: Tms Copilot Sync

on:
  workflow_call:
    inputs:
      source_repo:
        description: 'Repository to sync skills/instructions from (owner/repo)'
        type: string
        required: false
        default: 'navikt/tms-copilot'
      source_ref:
        description: 'Branch or tag to sync from'
        type: string
        required: false
        default: 'main'
      customizations:
        description: 'Comma-separated customization names/file names without .md, e.g. "readme-update, astro-aksel.instructions"'
        type: string
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tms-copilot-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Tms Copilot Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Clone source repo
        env:
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          git clone --depth 1 --branch "$SOURCE_REF" "https://github.com/$SOURCE_REPO.git" /tmp/source
          echo "SOURCE_SHA=$(git -C /tmp/source rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Sync selected customizations
        id: sync
        env:
          CUSTOMIZATIONS: ${{ inputs.customizations }}
        run: |
          if [[ "$CUSTOMIZATIONS" == *"["* || "$CUSTOMIZATIONS" == *"]"* ]]; then
            echo "::error::customizations must be comma-separated, e.g. readme-update, astro-aksel.instructions"
            exit 1
          fi

          mapfile -t selections < <(
            printf '%s' "$CUSTOMIZATIONS" \
              | tr ',' '\n' \
              | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
              | awk 'NF'
          )
          resolved_selections=()

          for raw_item in "${selections[@]}"; do
            item="$raw_item"
            item="${item%\"}"
            item="${item#\"}"
            item="${item%\'}"
            item="${item#\'}"
            if [[ "$item" == *"/"* || "$item" == /* || "$item" == *".."* || "$item" == *.md ]]; then
              echo "::error::Invalid customization '${item}'. Use only skill names or instruction names without path and without .md."
              exit 1
            fi

            skill_path=""
            if [ -d "/tmp/source/.github/skills/${item}" ]; then
              skill_path="skills/${item}"
            fi

            instruction_paths=()
            if [ -f "/tmp/source/.github/instructions/${item}.md" ]; then
              instruction_paths+=("instructions/${item}.md")
            fi
            if [ -f "/tmp/source/.github/instructions/${item}.instructions.md" ]; then
              instruction_paths+=("instructions/${item}.instructions.md")
            fi
            if [ -f "/tmp/source/.github/instructions/${item}.metadata.json" ]; then
              instruction_paths+=("instructions/${item}.metadata.json")
            fi

            if [ -n "$skill_path" ] && [ "${#instruction_paths[@]}" -gt 0 ]; then
              echo "::error::Ambiguous customization '${item}'. It matches both skill and instruction files. Use a unique name."
              exit 1
            fi

            resolved_paths=()
            if [ -n "$skill_path" ]; then
              resolved_paths+=("$skill_path")
            elif [ "${#instruction_paths[@]}" -gt 0 ]; then
              resolved_paths+=("${instruction_paths[@]}")
            else
              echo "::warning::Skipping missing customization: ${item}"
              continue
            fi

            for resolved in "${resolved_paths[@]}"; do
              source_path="/tmp/source/.github/${resolved}"
              target_path=".github/${resolved}"

              if [ -d "$source_path" ]; then
                mkdir -p "$target_path"
                rsync -a "$source_path"/ "$target_path"/
              elif [ -f "$source_path" ]; then
                mkdir -p "$(dirname "$target_path")"
                rsync -a "$source_path" "$target_path"
              else
                echo "::warning::Skipping missing customization: .github/${resolved}"
                continue
              fi

              resolved_selections+=("$resolved")
            done
          done

          {
            echo "selected<<EOF"
            if [ "${#resolved_selections[@]}" -eq 0 ]; then
              echo "(none)"
            else
              printf '%s\n' "${resolved_selections[@]}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Collect changed files
        id: changes
        run: |
          if [ -z "$(git status --porcelain=v1 -- .github/skills .github/instructions)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            git status --porcelain=v1 -- .github/skills .github/instructions | cut -c4-
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: skills-sync
          delete-branch: true
          commit-message: 'chore: sync tms-copilot'
          title: 'chore: sync tms-copilot'
          body: |
            Syncs selected customizations from [${{ inputs.source_repo }}](https://github.com/${{ inputs.source_repo }}).

            **Source:** `${{ inputs.source_repo }}@${{ env.SOURCE_SHA }}`
            **Selected customizations:**
            ```
            ${{ steps.sync.outputs.selected }}
            ```

            **Changed files:**
            ${{ steps.changes.outputs.files }}

            ---
            🤖 Created automatically by the Tms Copilot Sync workflow.
          labels: dependencies
